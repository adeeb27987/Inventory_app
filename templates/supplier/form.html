{% extends 'base.html' %}
{% block title %}{{ 'Edit' if supplier else 'Add' }} Supplier — InvenTrack{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-title">{{ '✏️ Edit Supplier' if supplier else '🏭 Add Supplier' }}</h2>
        <p class="page-subtitle">{{ 'Update supplier details' if supplier else 'Add a new supplier' }}</p>
    </div>
    <a href="{{ url_for('supplier.list_suppliers') }}" class="btn-ghost">← Back</a>
</div>

<div class="form-card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('supplier.edit_supplier', id=supplier.id) if supplier else url_for('supplier.add_supplier') }}">

        <div class="form-row">
            <div class="form-group">
                <label>Company Name <span class="required">*</span></label>
                <input type="text" name="company_name" value="{{ supplier.company_name if supplier else '' }}" placeholder="e.g. Dhaka Wholesale Ltd." required>
            </div>
            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" name="contact_person" value="{{ supplier.contact_person if supplier else '' }}" placeholder="e.g. Mr. Karim">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ supplier.email if supplier else '' }}" placeholder="supplier@example.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" value="{{ supplier.phone if supplier else '' }}" placeholder="+88017XXXXXXXX">
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" value="{{ supplier.address if supplier else '' }}" placeholder="Full address">
        </div>

        <div class="form-group">
            <label>Notes <span class="optional">(optional)</span></label>
            <textarea name="notes" placeholder="Any additional notes about this supplier...">{{ supplier.notes if supplier else '' }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('supplier.list_suppliers') }}" class="btn-ghost">Cancel</a>
            <button type="submit" class="btn-primary">
                {{ 'Save Changes' if supplier else 'Add Supplier' }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
